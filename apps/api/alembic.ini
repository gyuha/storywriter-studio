# ============================================================
# Alembic configuration for FastAPI Bootstrap
# ============================================================
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this ini file)
script_location = alembic

# Prepend sys.path so that alembic/env.py can import the package.
# "."   → project root (for alembic/ relative imports)
# "src" → src-layout package root (app lives at src/)
# env.py also inserts "src" at runtime as a safety net.
prepend_sys_path = . src

# Jinja2 template used to generate migration file names.
# %(year)d %(month).2d %(day).2d %(hour).2d %(minute).2d %(second).2d %(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Truncate slug (message) to this number of characters
truncate_slug_length = 40

# sys.path entries to prepend
# prepend_sys_path = .

# Timezone for migration timestamps (UTC recommended for production)
timezone = UTC

# Max number of migrations to compare at once (default 100)
# output_encoding = utf-8

# NOTE: `sqlalchemy.url` is intentionally left empty here.
# The actual database URL is read from the DATABASE_URL_SYNC environment
# variable inside alembic/env.py.  This keeps secrets out of ini files.
sqlalchemy.url =

# ── Logging configuration ─────────────────────────────────────────────────────
# These loggers are configured inline here (no external logging.conf required).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
